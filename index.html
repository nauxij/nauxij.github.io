<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>我的世界</title>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121212;
            color: #fff;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(135deg, #1f2937, #111827);
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #9ca3af;
            font-size: 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
        }

        .video-card {
            background: #1f2937;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 2rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        .video-container video,
        .video-container iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            object-fit: cover;
        }

        /* 封面层 */
        .video-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url(cover2.jpg) center/cover;
            cursor: pointer;
            z-index: 5;
        }

        /* 播放按钮 */
        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .play-btn::after {
            content: "";
            width: 0;
            height: 0;
            margin-left: 6px;
            border-top: 16px solid transparent;
            border-bottom: 16px solid transparent;
            border-left: 26px solid #fff;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
        }

        .fullscreen-btn:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        footer {
            text-align: center;
            padding: 2rem 1rem;
            color: #6b7280;
            font-size: 0.9rem;
        }
    </style>
    </head>
    <body>
        <header>
            <h1>我的视频集</h1>
            <p>生活片段 · 美好记录</p>
        </header>
        <div class="container">
            <div class="video-card">
                <div class="video-container">
                    <video id="v1" controls playsinline allowfullscreen poster="cover1.jpg"><source src="轻音乐.mp4" type="video/mp4"> 您的浏览器不支持播放视频
                    </video> <button class="fullscreen-btn" onclick="goFull('v1')">全屏</button>
                </div>
        </div>
        <footer>
            © 2026 我的视频站
        </footer>
        <script>
        function goFull(id) {
            const v = document.getElementById(id);
            if (v.requestFullscreen) v.requestFullscreen();
            else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
            else if (v.msRequestFullscreen) v.msRequestFullscreen();
        }

        function playBilibili(cover) {
            cover.style.display = 'none';
        }
    </script>
    </body>
</html>
