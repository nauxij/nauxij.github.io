<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8"> <!-- 强制横屏 + 占满屏幕关键 meta -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
        <title>我的视频集</title>
        <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  width: 100vw;
  height: 100vh;
  overflow: hidden; /* 禁止滚动 */
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

/* 强制容器占满全屏 */
.container,
.video-card,
.video-container {
  width: 100vw;
  height: 100vh;
  margin: 0;
  padding: 0;
  border-radius: 0;
  background: #000;
}

/* 视频100%铺满，无黑边 */
.video-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
.video-cover,
video,
iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover; /* 关键：拉伸填满 */
  border: none;
  display: none;
}
.video-cover {
  display: block;
  z-index: 5;
}

/* 隐藏头部底部，只留视频 */
header, footer {
  display: none !important;
}

.fullscreen-btn {
  position: absolute;
  bottom: 12px;
  right: 12px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  z-index: 10;
  display: none;
}
</style>
    </head>
    <body>
        <div class="container">
            <div class="video-card">
                <div class="video-container" onclick="playLocalVideo('v1', this)"><img class="video-cover" src="cover1.jpg" alt="封面">
                    <video id="v1" controls playsinline allowfullscreen><source src="你咋那么美.mp4" type="video/mp4"> 您的浏览器不支持播放视频
                    </video> <button class="fullscreen-btn" onclick="goFull('v1')">全屏</button>
                </div>
            </div>
        </div>
        <script>
// 强制横屏（安卓/部分浏览器生效）
function forceLandscape() {
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(e => {});
  }
}
window.addEventListener('load', forceLandscape);

function goFull(id) {
  const elem = document.getElementById(id);
  if (elem.requestFullscreen) elem.requestFullscreen();
  else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
  else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
}

function playLocalVideo(id, el) {
  const cover = el.querySelector('.video-cover');
  const video = document.getElementById(id);
  const btn = el.querySelector('.fullscreen-btn');

  cover.style.display = 'none';
  video.style.display = 'block';
  btn.style.display = 'block';
  video.play().catch(err => console.log(err));
}
</script>
    </body>
</html>
