<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>我的世界</title>
        <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: url('./1773451522775.png') center/cover fixed;
    color: #fff;
    line-height: 1.6;
    position: relative;
    min-height: 100vh;
}
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.15);
    z-index: -1;
}
header {
    text-align: center;
    padding: 3rem 1rem;
    background: rgba(200, 80, 40, 0.5);
    backdrop-filter: blur(8px);
}
header h1 {
    font-size: 2rem;
    margin-bottom: .5rem;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
header p {
    color: #d1d5db;
    font-size: 1rem;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 1rem;
}
.video-card {
    background: rgba(200, 80, 40, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 2rem;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
}
.video-container {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
}
.video-container iframe,
.video-container video {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
}
.video-cover {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000 center/cover;
    cursor: pointer;
    z-index: 5;
}
.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70px;
    height: 70px;
    background: rgba(255,255,255,.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
}
.play-btn::after {
    content: "";
    width: 0;
    height: 0;
    margin-left: 6px;
    border-top: 16px solid transparent;
    border-bottom: 16px solid transparent;
    border-left: 26px solid #fff;
}
.fullscreen-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: rgba(0,0,0,.6);
    color: #fff;
    border: 0;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    z-index: 10;
}
footer {
    text-align: center;
    padding: 2rem 1rem;
    color: #d1d5db;
    font-size: .9rem;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}
    </style>
    </head>
    <body>
        <header>
            <h1>我的视频集</h1>
            <p>生活片段 · 美好记录</p>
        </header>
        <div class="container"><!-- B 站视频 -->
            <div class="video-card">
                <div class="video-container">
                    <div class="video-cover" onclick="playBilibili(this)" style="background-image: url('./cover2.jpg');">
                        <div class="play-btn"></div>
                    </div> <iframe class="bili-iframe" src="//player.bilibili.com/player.html?aid=116203427201779&amp;bvid=BV1oaPZznEbP&amp;cid=36594713387&amp;p=1&amp;autoplay=0" scrolling="no" frameborder="no" allowfullscreen sandbox="allow-same-origin allow-scripts allow-presentation"> </iframe>
                </div>
            </div> <!-- 本地视频 -->
            <div class="video-card">
                <div class="video-container">
                    <video id="v-local" controls playsinline allowfullscreen poster="./cover1.jpg"><source src="吴妈用小度不熟.mp4" type="video/mp4"> 您的浏览器不支持视频播放
                    </video> <button class="fullscreen-btn" onclick="goFull('v-local')">全屏</button>
                </div>
            </div>
        </div>
        <footer>
            © 2026 我的视频站
        </footer>
        <script>
// 全屏
function goFull(id) {
  const el = document.getElementById(id);
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.msRequestFullscreen) el.msRequestFullscreen();
}

// 点击播放B站
function playBilibili(cover) {
  const iframe = cover.nextElementSibling;
  iframe.src = iframe.src.replace('&autoplay=0', '&autoplay=1');
  cover.style.display = 'none';
}
</script>
    </body>
</html>
