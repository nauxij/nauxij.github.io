<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的视频集</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #121212;
  color: #fff;
  line-height: 1.6;
}
header {
  text-align: center;
  padding: 3rem 1rem;
  background: linear-gradient(135deg, #1f2937, #111827);
}
header h1 {
  font-size: 2rem;
  margin-bottom: 0.5rem;
}
header p {
  color: #9ca3af;
  font-size: 1rem;
}
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 1rem;
}
.video-card {
  background: #1f2937;
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 2rem;
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}
.video-card h3 {
  padding: 1rem 1.2rem;
  font-size: 1.1rem;
  color: #f3f4f6;
}
.video-container {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
}
.video-container video {
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  object-fit: cover;
}
.fullscreen-btn {
  position: absolute;
  bottom: 12px;
  right: 12px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: none;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  z-index: 10;
}
.fullscreen-btn:hover {
  background: rgba(0,0,0,0.8);
}
footer {
  text-align: center;
  padding: 2rem 1rem;
  color: #6b7280;
  font-size: 0.9rem;
}
</style>
</head>

<body>
<header>
  <h1>我的视频集</h1>
  <p>生活片段 · 美好记录</p>
</header>

<div class="container">
  <div class="video-card">
    <h3>你咋那么美</h3>
    <div class="video-container">
      <video id="v1" controls autoplay muted loop poster="cover1.jpg" playsinline allowfullscreen>
        <source src="你咋那么美.mp4" type="video/mp4">
        您的浏览器不支持播放
      </video>
      <button class="fullscreen-btn" onclick="goFull('v1')">全屏</button>
    </div>
  </div>

  <div class="video-card">
    <h3>8023</h3>
    <div class="video-container">
      <video id="v2" controls autoplay muted loop poster="cover2.jpg" playsinline allowfullscreen>
        <source src="8023.mp4" type="video/mp4">
        您的浏览器不支持播放
      </video>
      <button class="fullscreen-btn" onclick="goFull('v2')">全屏</button>
    </div>
  </div>
</div>

<footer>© 2026 我的视频站</footer>

<script>
function goFull(id) {
  const v = document.getElementById(id);
  if (v.requestFullscreen) v.requestFullscreen();
  else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen();
  else if (v.msRequestFullscreen) v.msRequestFullscreen();
}
</script>
</body>
</html>
