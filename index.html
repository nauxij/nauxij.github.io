body::before {
    content: "";

    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.15);
    z-index: -1;
}
header {
    text-align: center;
    padding: 3rem 1rem;
    background: rgba(200, 80, 40, 0.5);
    backdrop-filter: blur(8px);
}
header h1 {
    font-size: 2rem;

}
header p {
    color: #d1d5db;

}
.container {
    max-width: 800px;
    margin: 0 auto;
    padding: 1rem;
}
/* 下载按钮区域样式 */
.download-section {
    margin: 2rem 0;
}
.download-row {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    justify-content: center;
}
.download-btn {
    flex: 1;
    min-width: 180px;
    max-width: 220px;
    aspect-ratio: 1 / 1;
    background: rgba(200, 80, 40, 0.7);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #fff;
    transition: all 0.3s ease;
    cursor: pointer;
}
.download-btn:hover {
    background: rgba(200, 80, 40, 0.85);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.download-btn .app-icon {
    width: 60px;
    height: 60px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
}
.download-btn .app-name {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    text-align: center;
}
.download-btn .app-desc {
    font-size: 0.85rem;
    color: #e5e7eb;
    text-align: center;
    padding: 0 0.5rem;
}
.video-card {
    background: rgba(200, 80, 40, 0.6);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 2rem;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
}
.video-container {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
}
.video-container iframe,
.video-container video {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
}
.video-cover {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000 center/cover;
    cursor: pointer;
    z-index: 5;
}
.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70px;
    height: 70px;
    background: rgba(255,255,255,.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
}
.play-btn::after {
    content: "";
    width: 0;
    height: 0;
    margin-left: 6px;
    border-top: 16px solid transparent;
    border-bottom: 16px solid transparent;
    border-left: 26px solid #fff;
}
.fullscreen-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: rgba(0,0,0,.6);
    color: #fff;
    border: 0;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    z-index: 10;
}
footer {
    text-align: center;
    padding: 2rem 1rem;
    color: #d1d5db;
    font-size: .9rem;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

        <script>
// 全屏
function goFull(id) {
  const el = document.getElementById(id);
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  else if (el.msRequestFullscreen) el.msRequestFullscreen();
}

// 点击播放B站
function playBilibili(cover) {
  const iframe = cover.nextElementSibling;
  if (iframe.src.includes('autoplay=0')) {
    iframe.src = iframe.src.replace('autoplay=0', 'autoplay=1');
  } else {
    iframe.src += '&autoplay=1';
  }
  cover.style.display = 'none';
}
